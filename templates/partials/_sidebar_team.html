<!-- 왼쪽 팀 사이드바: 상단(팀목표) / 중간(멤버랭킹) / 하단(기타) -->
<aside class="sidebar-team">
  <!-- 상단: 팀 목표 (site_team_settings 연동) -->
  <section class="sidebar-section sidebar-top">
    <div class="sidebar-section-title-row">
      <h3 class="sidebar-section-title">팀 목표</h3>
      <span id="sidebarTeamAdminBtns" style="display:inline-flex;gap:6px">
        <button type="button" class="sidebar-team-edit-btn" id="sidebarTeamAddBtn" title="팀 목표 추가">추가</button>
        <button type="button" class="sidebar-team-edit-btn" id="sidebarTeamEditBtn" title="팀 목표 수정" style="display:none">편집</button>
      </span>
    </div>
    <div class="sidebar-year-row" id="sidebarYearRow" style="margin-bottom:10px;display:none">
      <label style="font-size:0.75rem;color:var(--gray-muted);margin-right:8px">연도</label>
      <select id="sidebarTeamYear" style="font-size:0.85rem;padding:4px 8px;border-radius:6px;border:1px solid var(--border-gray)">
        <option value="">선택</option>
      </select>
    </div>
    <div class="sidebar-team-name" id="sidebarTeamName">로딩 중...</div>
    <div class="sidebar-team-profile">
      <div class="sidebar-team-avatar" id="sidebarTeamAvatar">팀</div>
      <p class="sidebar-team-desc" id="sidebarTeamDesc"></p>
    </div>
    <div class="sidebar-stat-row">
      <span class="sidebar-stat-label">올해 목표</span>
      <span style="display:flex;align-items:center;gap:6px">
        <span class="sidebar-stat-value" id="sidebarGoalPrize">0만원</span>
        <span class="sidebar-closed-badge" id="sidebarGoalClosedBadge" style="display:none">마감</span>
      </span>
    </div>
    <div class="sidebar-stat-row">
      <span class="sidebar-stat-label">현재 달성</span>
      <span class="sidebar-stat-value sidebar-stat-achieved" id="sidebarGoalAchieved">0원</span>
    </div>
    <div class="sidebar-goal-bar">
      <div class="sidebar-goal-fill" id="sidebarGoalFill" style="width: 0%"></div>
    </div>
    <p class="sidebar-goal-hint" id="sidebarGoalHint"></p>
    <button type="button" class="sidebar-team-edit-btn" id="sidebarGoalSetBtn" title="팀 목표 추가/수정" style="width:100%;margin-top:8px">새로운 목표 설정하기</button>
  </section>

  <!-- 중간: 멤버 랭킹 (role=member 프로필, 참가 건수 순) -->
  <section class="sidebar-section sidebar-mid">
    <h3 class="sidebar-section-title">멤버 랭킹</h3>
    <ul class="sidebar-ranking-list" id="sidebarRankingList">
      <li class="sidebar-ranking-item" style="color:var(--gray-muted);font-size:0.85rem;">로딩 중...</li>
    </ul>
  </section>

  <!-- 하단: 팀 활동 (참가 최근 5) -->
  <section class="sidebar-section sidebar-bottom">
    <h3 class="sidebar-section-title">팀 활동</h3>
    <div class="activity-line">
      <div class="activity-section">
        <div class="activity-section-title participate">참가 (최근 5)</div>
        <div class="activity-list" id="activityParticipateList"></div>
      </div>
    </div>
  </section>
</aside>

<style>
  .sidebar-team {
    position: fixed;
    left: 0;
    top: 96px;
    width: 260px;
    height: calc(100vh - 96px);
    background: linear-gradient(180deg, #faf8ff 0%, #f5f3ff 100%);
    border-right: 1px solid var(--border-gray);
    box-shadow: 2px 0 12px rgba(0,0,0,0.04);
    z-index: 80;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .sidebar-team .sidebar-section {
    padding: 16px;
    border-bottom: 1px solid var(--border-gray);
    min-width: 0;
    overflow: hidden;
  }
  .sidebar-team .sidebar-section:last-child { border-bottom: none; }
  .sidebar-team .sidebar-section-title {
    font-size: 0.75rem;
    font-weight: 700;
    color: var(--main-purple);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 12px;
    padding-bottom: 8px;
    border-bottom: 1px solid rgba(109,40,217,0.2);
  }
  .sidebar-team-name {
    font-size: 1rem;
    font-weight: 700;
    color: var(--text-dark);
    margin-bottom: 10px;
  }
  .sidebar-team-profile {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 16px;
  }
  .sidebar-team-avatar {
    width: 40px;
    height: 40px;
    border-radius: 10px;
    background: linear-gradient(135deg, var(--main-purple), #8b5cf6);
    background-size: cover;
    background-position: center;
    color: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.1rem;
    font-weight: 700;
  }
  .sidebar-team-desc {
    font-size: 0.8rem;
    color: var(--gray-muted);
    line-height: 1.4;
  }
  .sidebar-stat-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 0.85rem;
    margin-bottom: 6px;
  }
  .sidebar-stat-label { color: var(--gray-muted); }
  .sidebar-stat-value { font-weight: 700; color: var(--main-purple); }
  .sidebar-closed-badge { font-size: 0.65rem; font-weight: 600; padding: 2px 6px; border-radius: 4px; background: #6b7280; color: #fff; margin-left: 6px; }
  .sidebar-goal-bar {
    height: 8px;
    background: rgba(109,40,217,0.15);
    border-radius: 4px;
    overflow: hidden;
    margin-top: 12px;
  }
  .sidebar-goal-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--main-purple), #8b5cf6);
    border-radius: 4px;

  }
  .sidebar-goal-hint {
    font-size: 0.75rem;
    color: var(--gray-muted);
    margin-top: 6px;
    text-align: right;
  }
  .sidebar-ranking-list { list-style: none; }
  .sidebar-ranking-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 12px;
    margin-bottom: 4px;
    background: rgba(255,255,255,0.8);
    border-radius: 8px;
    font-size: 0.88rem;
  }
  .sidebar-ranking-item a {
    display: flex;
    align-items: center;
    gap: 10px;
    flex: 1;
    min-width: 0;
    text-decoration: none;
    color: inherit;
  }
  .sidebar-ranking-item:hover { background: var(--soft-purple); }
  .sidebar-rank {
    width: 24px;
    height: 24px;
    border-radius: 6px;
    background: var(--main-purple);
    color: #fff;
    font-size: 0.75rem;
    font-weight: 700;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .sidebar-ranking-item:nth-child(2) .sidebar-rank { background: #6b7280; }
  .sidebar-ranking-item:nth-child(3) .sidebar-rank { background: #b45309; }
  .sidebar-ranking-item:nth-child(4) .sidebar-rank { background: var(--gray-muted); }
  .sidebar-rank-name { flex: 1; font-weight: 600; color: var(--text-dark); }
  .sidebar-rank-value { font-size: 0.8rem; font-weight: 600; color: var(--main-purple); }
  .sidebar-mid { flex: 1; min-height: 0; overflow-y: auto; }
  .sidebar-bottom { flex-shrink: 0; overflow-y: auto; overflow-x: hidden; max-height: 300px; min-width: 0; }
  /* 팀활동라인 */
  .sidebar-team .activity-line {
    display: flex;
    flex-direction: column;
    gap: 12px;
    min-width: 0;
  }
  .sidebar-team .activity-section {
    display: flex;
    flex-direction: column;
    gap: 6px;
    min-width: 0;
  }
  .sidebar-team .activity-section-title {
    font-size: 0.7rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .sidebar-team .activity-section-title.participate { color: #059669; }
  .sidebar-team .activity-list {
    display: flex;
    flex-direction: column;
    gap: 6px;
    max-height: 130px;
    overflow-y: scroll;
    overflow-x: hidden;
    min-width: 0;
    padding: 2px 6px 8px 0;
  }
  .sidebar-team .activity-item {
    font-size: 0.75rem;
    line-height: 1.5;
    padding: 7px 8px;
    border-radius: 6px;
    background: rgba(109,40,217,0.08);
    text-decoration: none;
    color: var(--text-dark);
    display: block;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    min-width: 0;
    max-width: 100%;
    box-sizing: border-box;
    flex-shrink: 0;
  }
  .sidebar-team .activity-item:hover { background: var(--soft-purple); }
  .sidebar-team .activity-item.participate { border-left: 3px solid #059669; }
  .sidebar-team .activity-item .activity-name { font-weight: 600; color: var(--main-purple); }
  .sidebar-team .activity-item .activity-dot { color: var(--gray-muted); margin: 0 4px; }
  .sidebar-team .activity-item .activity-title { color: var(--text-dark); }
  .sidebar-section-title-row { display: flex; align-items: center; justify-content: space-between; gap: 8px; margin-bottom: 12px; padding-bottom: 8px; border-bottom: 1px solid rgba(109,40,217,0.2); min-width: 0; }
  .sidebar-section-title-row .sidebar-section-title { margin-bottom: 0; flex-shrink: 0; }
  .sidebar-section-title-row #sidebarTeamAdminBtns { flex-shrink: 0; }
  .sidebar-team-edit-btn {
    padding: 4px 10px; font-size: 0.7rem; font-weight: 600; border: 1px solid var(--main-purple); background: transparent;
    color: var(--main-purple); border-radius: 6px; cursor: pointer; transition: background 0.2s, color 0.2s;
  }
  .sidebar-team-edit-btn:hover { background: var(--main-purple); color: #fff; }
  #modalTeamSettings .modal-header { display: flex; justify-content: space-between; align-items: center; padding: 16px 20px; border-bottom: 1px solid #e5e7eb; }
  #modalTeamSettings .modal-header h4 { margin: 0; font-size: 1.1rem; }
  #modalTeamSettings .modal-close { background: none; border: none; font-size: 1.5rem; cursor: pointer; color: #6b7280; padding: 0 4px; line-height: 1; }
  #modalTeamSettings .modal-close:hover { color: #111; }
  #modalTeamSettings .modal-body { padding: 20px; }
  #modalTeamSettings .form-group label { display: block; font-size: 0.85rem; font-weight: 600; margin-bottom: 6px; }
  #modalTeamSettings .btn-primary { padding: 8px 16px; background: var(--main-purple); color: #fff; border: none; border-radius: 6px; cursor: pointer; font-weight: 500; }
  #modalTeamSettings .btn-outline { padding: 8px 16px; background: #fff; color: #374151; border: 1px solid #d1d5db; border-radius: 6px; cursor: pointer; font-weight: 500; }
</style>

<div class="modal-overlay" id="modalTeamSettings" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:9999;align-items:center;justify-content:center;flex-direction:row">
  <div class="modal-box" style="max-width:400px;background:#fff;border-radius:12px;padding:0;box-shadow:0 20px 60px rgba(0,0,0,0.2)">
    <div class="modal-header">
      <h4>팀 설정</h4>
      <button type="button" class="modal-close" onclick="closeTeamSettingsModal()" aria-label="닫기">×</button>
    </div>
    <div class="modal-body">
      <div class="form-group" style="margin-bottom:12px">
        <label>연도</label>
        <select id="teamSettingsYear" style="width:100%;padding:8px 12px;border:1px solid var(--border-gray);border-radius:6px"></select>
      </div>
      <div class="form-group" style="margin-bottom:12px">
        <label>팀 프로필 이미지</label>
        <div class="team-image-preview" id="teamSettingsImagePreview" style="width:80px;height:80px;border-radius:10px;background:#f3f4f6;margin-bottom:8px;background-size:cover;background-position:center"></div>
        <input type="file" id="teamSettingsImageFile" accept="image/*" style="font-size:0.85rem">
      </div>
      <div class="form-group" style="margin-bottom:12px">
        <label>팀 이름</label>
        <input type="text" id="teamSettingsName" placeholder="우리 팀" style="width:100%;padding:8px 12px;border:1px solid var(--border-gray);border-radius:6px">
      </div>
      <div class="form-group" style="margin-bottom:12px">
        <label>팀 설명</label>
        <input type="text" id="teamSettingsDesc" placeholder="팀 설명" style="width:100%;padding:8px 12px;border:1px solid var(--border-gray);border-radius:6px">
      </div>
      <div class="form-group" style="margin-bottom:16px">
        <label>목표 금액 (만원)</label>
        <input type="number" id="teamSettingsGoal" min="0" placeholder="2000" style="width:100%;padding:8px 12px;border:1px solid var(--border-gray);border-radius:6px">
      </div>
      <div style="display:flex;gap:8px;justify-content:space-between;flex-wrap:wrap">
        <div style="display:flex;gap:6px">
          <button type="button" class="btn-outline" id="teamSettingsClose" style="display:none;border-color:#dc2626;color:#dc2626">마감</button>
          <button type="button" class="btn-outline" id="teamSettingsDelete" style="border-color:#dc2626;color:#dc2626;display:none">삭제</button>
        </div>
        <div style="display:flex;gap:8px;margin-left:auto">
          <button type="button" class="btn-outline" onclick="closeTeamSettingsModal()">취소</button>
          <button type="button" class="btn-primary" id="teamSettingsSave">저장</button>
        </div>
      </div>
    </div>
  </div>
</div>
<script>
(function() {
  function escapeHtml(s) { return String(s || '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]); }
  function formatPrize(n) { return n >= 0 ? (n >= 10000 ? (n/10000) + '억원' : n + '만원') : '0만원'; }
  function formatWon(n) {
    if (n == null || isNaN(n)) return '0원';
    var v = Math.floor(Number(n));
    return (v >= 10000 ? (v/10000) + '만' : v.toLocaleString()) + '원';
  }

  function getSidebarYear() {
    var sel = document.getElementById('sidebarTeamYear');
    var v = sel ? (sel.value || '') : '';
    var n = parseInt(v, 10);
    return (!isNaN(n) && n > 0) ? n : null;
  }

  function openTeamSettingsModal(data, isAddMode) {
    var m = document.getElementById('modalTeamSettings');
    var yearSel = document.getElementById('teamSettingsYear');
    var nameInp = document.getElementById('teamSettingsName');
    var descInp = document.getElementById('teamSettingsDesc');
    var goalInp = document.getElementById('teamSettingsGoal');
    var imgPreview = document.getElementById('teamSettingsImagePreview');
    var closeBtn = document.getElementById('teamSettingsClose');
    var deleteBtn = document.getElementById('teamSettingsDelete');
    var imgFile = document.getElementById('teamSettingsImageFile');
    var curYear = new Date().getFullYear();
    if (yearSel) {
      var opts = [];
      for (var y = curYear - 2; y <= curYear + 3; y++) opts.push(y);
      (teamYearsList || []).forEach(function(y) { if (opts.indexOf(y) < 0) opts.push(y); });
      opts.sort(function(a,b) { return b - a; });
      yearSel.innerHTML = opts.map(function(y) { return '<option value="' + y + '">' + y + '년</option>'; }).join('');
    }
    if (data && !isAddMode) {
      if (yearSel) { yearSel.value = data.year || curYear; yearSel.disabled = true; }
      if (nameInp) nameInp.value = data.team_name || '';
      if (descInp) descInp.value = data.team_desc || '';
      if (goalInp) goalInp.value = data.goal_prize != null ? data.goal_prize : '';
      if (imgPreview) imgPreview.style.backgroundImage = data.image_path ? "url('" + (data.image_path || '').replace(/'/g, "\\'") + "')" : 'none';
      var isClosed = !!data.closed;
      if (closeBtn) closeBtn.style.display = (isClosed ? 'none' : 'inline-block');
      if (deleteBtn) deleteBtn.style.display = (isClosed ? 'none' : 'inline-block');
    } else {
      if (yearSel) { yearSel.value = curYear; yearSel.disabled = false; }
      if (nameInp) nameInp.value = '';
      if (descInp) descInp.value = '';
      if (goalInp) goalInp.value = '';
      if (imgPreview) imgPreview.style.backgroundImage = 'none';
      if (deleteBtn) deleteBtn.style.display = 'none';
      if (closeBtn) closeBtn.style.display = 'none';
    }
    if (imgFile) imgFile.value = '';
    if (m) { m.style.display = 'flex'; document.body.style.overflow = 'hidden'; }
  }
  function closeTeamSettingsModal() {
    var m = document.getElementById('modalTeamSettings');
    if (m) { m.style.display = 'none'; document.body.style.overflow = ''; }
  }
  window.closeTeamSettingsModal = closeTeamSettingsModal;

  var teamYearsList = [];
  function loadTeamYears() {
    fetch('/api/team/settings?list=1').then(function(r) { return r.json(); }).then(function(j) {
      var adminBtns = document.getElementById('sidebarTeamAdminBtns');
      var addBtn = document.getElementById('sidebarTeamAddBtn');
      var editBtn = document.getElementById('sidebarTeamEditBtn');
      var yearRow = document.getElementById('sidebarYearRow');
      var canEdit = j.can_edit === true || j.can_edit === 'true';
      if (adminBtns) adminBtns.style.display = canEdit ? 'inline-flex' : 'none';
      var goalSetBtn = document.getElementById('sidebarGoalSetBtn');
      if (goalSetBtn) goalSetBtn.style.display = canEdit ? 'block' : 'none';
      if (j.success && j.data && j.data.length) {
        teamYearsList = j.data.map(function(x) { var y = x.year; return (y != null && y !== '') ? parseInt(y, 10) : null; }).filter(function(y) { return y != null && !isNaN(y); }).sort(function(a,b) { return b - a; });
        var yearSel = document.getElementById('sidebarTeamYear');
        if (yearSel) {
          yearSel.innerHTML = teamYearsList.map(function(n) { return '<option value="' + n + '">' + n + '년</option>'; }).join('');
          var curYear = new Date().getFullYear();
          yearSel.value = teamYearsList.indexOf(curYear) >= 0 ? curYear : (teamYearsList[0] || '');
        }
        if (yearRow) yearRow.style.display = 'flex';
        if (addBtn) addBtn.style.display = 'inline-block';
        if (editBtn) editBtn.style.display = 'inline-block';
      } else {
        teamYearsList = [];
        if (yearRow) yearRow.style.display = 'none';
        if (addBtn) addBtn.style.display = 'inline-block';
        if (editBtn) editBtn.style.display = 'none';
      }
      // 병렬 호출로 최적화 (순차 호출 → 병렬 호출)
      Promise.all([loadTeamSettings(), loadPrizeProgress()]).catch(function() {
        // 에러 처리
      });
    }).catch(function() {
      teamYearsList = [];
      var yearRow = document.getElementById('sidebarYearRow');
      var addBtn = document.getElementById('sidebarTeamAddBtn');
      var editBtn = document.getElementById('sidebarTeamEditBtn');
      if (yearRow) yearRow.style.display = 'none';
      if (addBtn) addBtn.style.display = 'inline-block';
      if (editBtn) editBtn.style.display = 'none';
      // 병렬 호출로 최적화
      Promise.all([loadTeamSettings(), loadPrizeProgress()]).catch(function() {
        // 에러 처리
      });
    });
  }

  function loadTeamSettings() {
    var year = getSidebarYear();
    const teamNameEl = document.getElementById('sidebarTeamName');
    const teamAvatarEl = document.getElementById('sidebarTeamAvatar');
    const teamDescEl = document.getElementById('sidebarTeamDesc');
    if (!teamNameEl) return;
    if (!year || teamYearsList.length === 0) {
      teamNameEl.textContent = '우리 팀';
      if (teamAvatarEl) { teamAvatarEl.style.backgroundImage = ''; teamAvatarEl.textContent = '팀'; }
      if (teamDescEl) teamDescEl.textContent = '팀 목표를 설정해 보세요';
      return;
    }
    fetch('/api/team/settings?year=' + encodeURIComponent(year)).then(function(r) { return r.json(); }).then(function(j) {
      if (!j.success || !j.data) {
        teamNameEl.textContent = '우리 팀';
        if (teamAvatarEl) { teamAvatarEl.style.backgroundImage = ''; teamAvatarEl.textContent = '팀'; }
        if (teamDescEl) teamDescEl.textContent = '팀 목표를 설정해 보세요';
        return;
      }
      const d = j.data;
      const name = (d.team_name || '우리 팀').trim() || '우리 팀';
      teamNameEl.textContent = name;
      if (teamAvatarEl) {
        if (d.image_path) {
          teamAvatarEl.style.backgroundImage = "url('" + (d.image_path || '').replace(/'/g, "\\'") + "')";
          teamAvatarEl.textContent = '';
        } else {
          teamAvatarEl.style.backgroundImage = '';
          teamAvatarEl.textContent = name.charAt(0).toUpperCase() || '팀';
        }
      }
      if (teamDescEl) teamDescEl.textContent = escapeHtml(d.team_desc || '').trim() || '팀 목표를 설정해 보세요';
    }).catch(function() {
      teamNameEl.textContent = '우리 팀';
      if (teamAvatarEl) { teamAvatarEl.style.backgroundImage = ''; teamAvatarEl.textContent = '팀'; }
      if (teamDescEl) teamDescEl.textContent = '';
    });
  }

  var yearSelEl = document.getElementById('sidebarTeamYear');
  if (yearSelEl) yearSelEl.addEventListener('change', function() { 
    // 병렬 호출로 최적화
    Promise.all([loadTeamSettings(), loadPrizeProgress()]).catch(function() {
      // 에러 처리
    });
  });

  loadTeamYears();

  (function initTeamSettingsEdit() {
    const addBtn = document.getElementById('sidebarTeamAddBtn');
    const editBtn = document.getElementById('sidebarTeamEditBtn');
    const goalSetBtn = document.getElementById('sidebarGoalSetBtn');
    const saveBtn = document.getElementById('teamSettingsSave');
    const closeBtn = document.getElementById('teamSettingsClose');
    if (addBtn) {
      addBtn.onclick = function() {
        openTeamSettingsModal(null, true);
      };
    }
    if (editBtn) {
      editBtn.onclick = function() {
        var year = getSidebarYear();
        if (!year) return;
        fetch('/api/team/settings?year=' + encodeURIComponent(year)).then(function(r) { return r.json(); }).then(function(j) {
          if (j.success && j.data) openTeamSettingsModal(j.data, false);
        });
      };
    }
    if (goalSetBtn) {
      goalSetBtn.onclick = function() {
        var year = getSidebarYear();
        if (year && teamYearsList && teamYearsList.length) {
          fetch('/api/team/settings?year=' + encodeURIComponent(year)).then(function(r) { return r.json(); }).then(function(j) {
            if (j.success && j.data && !j.data.closed) openTeamSettingsModal(j.data, false);
            else openTeamSettingsModal(null, true);
          });
        } else {
          openTeamSettingsModal(null, true);
        }
      };
    }
    if (closeBtn) {
      closeBtn.onclick = function() {
        var yearSel = document.getElementById('teamSettingsYear');
        var y = yearSel ? yearSel.value : getSidebarYear();
        if (!confirm(y + '년 팀 목표를 마감할까요? 마감 후 수정이 불가합니다.')) return;
        fetch('/api/team/settings/close?year=' + encodeURIComponent(y), { method: 'POST' }).then(function(r) { return r.json(); }).then(function(j) {
          if (j.success) {
            closeTeamSettingsModal();
            loadTeamYears();
            var toast = document.getElementById('toast');
            if (toast) { toast.textContent = '마감되었습니다.'; toast.className = 'toast success'; toast.style.display = 'block'; setTimeout(function() { toast.style.display = 'none'; }, 2000); }
          } else {
            var t = document.getElementById('toast');
            if (t) { t.textContent = j.error || '마감 실패'; t.className = 'toast error'; t.style.display = 'block'; setTimeout(function() { t.style.display = 'none'; }, 2000); }
          }
        });
      };
    }
    var deleteBtnEl = document.getElementById('teamSettingsDelete');
    if (deleteBtnEl) {
      deleteBtnEl.onclick = function() {
        var yearSel = document.getElementById('teamSettingsYear');
        var y = yearSel ? yearSel.value : getSidebarYear();
        if (!confirm(y + '년 팀 설정을 삭제할까요?')) return;
        fetch('/api/team/settings?year=' + encodeURIComponent(y), { method: 'DELETE' }).then(function(r) { return r.json(); }).then(function(j) {
          if (j.success) {
            closeTeamSettingsModal();
            loadTeamYears();
            var toast = document.getElementById('toast');
            if (toast) { toast.textContent = '삭제되었습니다.'; toast.className = 'toast success'; toast.style.display = 'block'; setTimeout(function() { toast.style.display = 'none'; }, 2000); }
          } else {
            var t = document.getElementById('toast');
            if (t) { t.textContent = j.error || '삭제 실패'; t.className = 'toast error'; t.style.display = 'block'; setTimeout(function() { t.style.display = 'none'; }, 2000); }
          }
        });
      };
    }
    if (saveBtn) {
      saveBtn.onclick = function() {
        var yearSel = document.getElementById('teamSettingsYear');
        var nameInp = document.getElementById('teamSettingsName');
        var descInp = document.getElementById('teamSettingsDesc');
        var goalInp = document.getElementById('teamSettingsGoal');
        var imgFile = document.getElementById('teamSettingsImageFile');
        var year = yearSel ? yearSel.value : getSidebarYear();
        var payload = {
          year: parseInt(year, 10) || new Date().getFullYear(),
          team_name: nameInp ? nameInp.value.trim() || '우리 팀' : '우리 팀',
          team_desc: descInp ? descInp.value.trim() : '',
          goal_prize: goalInp && goalInp.value !== '' ? parseInt(goalInp.value, 10) : 0
        };
        if (isNaN(payload.goal_prize) || payload.goal_prize < 0) payload.goal_prize = 0;
        function doSave() {
          fetch('/api/team/settings', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
          }).then(function(r) { return r.json(); }).then(function(j) {
            if (j.success) {
              if (imgFile && imgFile.files && imgFile.files[0]) {
                var fd = new FormData();
                fd.append('file', imgFile.files[0]);
                fd.append('year', payload.year);
                fetch('/api/team/settings/image', { method: 'POST', body: fd }).then(function() {
                  closeTeamSettingsModal();
                  loadTeamYears();
                  var toast = document.getElementById('toast');
                  if (toast) { toast.textContent = '저장되었습니다.'; toast.className = 'toast success'; toast.style.display = 'block'; setTimeout(function() { toast.style.display = 'none'; }, 2000); }
                });
              } else {
                closeTeamSettingsModal();
                loadTeamYears();
                var toast = document.getElementById('toast');
                if (toast) { toast.textContent = '저장되었습니다.'; toast.className = 'toast success'; toast.style.display = 'block'; setTimeout(function() { toast.style.display = 'none'; }, 2000); }
              }
            } else {
              var t = document.getElementById('toast');
              if (t) { t.textContent = j.error || '저장 실패'; t.className = 'toast error'; t.style.display = 'block'; setTimeout(function() { t.style.display = 'none'; }, 2000); }
            }
          }).catch(function() {
            var t = document.getElementById('toast');
            if (t) { t.textContent = '저장에 실패했습니다.'; t.className = 'toast error'; t.style.display = 'block'; setTimeout(function() { t.style.display = 'none'; }, 2000); }
          });
        }
        doSave();
      };
    }
    document.getElementById('teamSettingsImageFile') && document.getElementById('teamSettingsImageFile').addEventListener('change', function(e) {
      var f = e.target.files[0];
      var prev = document.getElementById('teamSettingsImagePreview');
      if (f && prev) {
        var r = new FileReader();
        r.onload = function() { prev.style.backgroundImage = "url('" + r.result + "')"; };
        r.readAsDataURL(f);
      }
    });
    document.getElementById('modalTeamSettings') && document.getElementById('modalTeamSettings').addEventListener('click', function(e) {
      if (e.target === this) closeTeamSettingsModal();
    });
  })();

  function loadPrizeProgress() {
    const goalPrizeEl = document.getElementById('sidebarGoalPrize');
    const goalAchievedEl = document.getElementById('sidebarGoalAchieved');
    const goalFillEl = document.getElementById('sidebarGoalFill');
    const goalHintEl = document.getElementById('sidebarGoalHint');
    const goalSetBtn = document.getElementById('sidebarGoalSetBtn');
    if (!goalPrizeEl) return;
    var year = getSidebarYear();
    var closedBadge = document.getElementById('sidebarGoalClosedBadge');
    if (!year || !teamYearsList || !teamYearsList.length) {
      goalPrizeEl.textContent = '0만원';
      if (goalAchievedEl) goalAchievedEl.textContent = '0원';
      if (goalFillEl) goalFillEl.style.width = '0%';
      if (goalHintEl) goalHintEl.textContent = '목표를 설정해 주세요';
      if (goalSetBtn) goalSetBtn.textContent = '새로운 목표 설정하기';
      if (closedBadge) closedBadge.style.display = 'none';
      return;
    }
    fetch('/api/team/prize-progress?year=' + encodeURIComponent(year)).then(function(r) { return r.json(); }).then(function(j) {
      const goalMan = Math.max(0, parseInt(j.goal_prize, 10) || 0);
      const achieved = Math.max(0, parseInt(j.total_achieved, 10) || 0);
      const goalWon = goalMan * 10000;
      goalPrizeEl.textContent = formatPrize(goalMan);
      if (goalAchievedEl) goalAchievedEl.textContent = formatWon(achieved);
      var pct = 0;
      var hint = '';
      if (goalWon > 0) {
        pct = Math.min(100, (achieved / goalWon) * 100);
        var remaining = goalWon - achieved;
        if (remaining <= 0) {
          hint = '목표 달성!';
        } else {
          hint = formatWon(achieved) + ' / 목표 ' + formatWon(goalWon) + ', ' + formatWon(remaining) + ' 남음';
        }
      } else {
        hint = achieved > 0 ? '달성 ' + formatWon(achieved) + ' (목표 미설정)' : '목표를 설정해 주세요';
      }
      if (goalFillEl) goalFillEl.style.width = pct + '%';
      if (goalHintEl) goalHintEl.textContent = hint + (j.closed ? ' (마감)' : '');
      if (goalSetBtn) goalSetBtn.textContent = (j.closed ? '새로운 목표 설정하기' : '해당 목표 수정하기');
      if (closedBadge) closedBadge.style.display = j.closed ? 'inline' : 'none';
    }).catch(function() {
      if (goalPrizeEl) goalPrizeEl.textContent = '0만원';
      if (goalAchievedEl) goalAchievedEl.textContent = '0원';
      if (goalFillEl) goalFillEl.style.width = '0%';
      if (goalHintEl) goalHintEl.textContent = '목표를 설정해 주세요';
      if (goalSetBtn) goalSetBtn.textContent = '새로운 목표 설정하기';
      if (closedBadge) closedBadge.style.display = 'none';
    });
  }

  // 멤버 랭킹 로드 (role=member)
  const rankingList = document.getElementById('sidebarRankingList');
  if (rankingList) {
    fetch('/api/team/members').then(function(r) { return r.json(); }).then(function(j) {
      if (!j.success || !j.data || j.data.length === 0) {
        rankingList.innerHTML = '<li class="sidebar-ranking-item" style="color:var(--gray-muted);font-size:0.85rem;">멤버가 없습니다.</li>';
        return;
      }
      rankingList.innerHTML = j.data.map(function(m, i) {
        const rank = i + 1;
        const name = escapeHtml(m.nickname || '회원');
        const cnt = m.participate_count || 0;
        const value = cnt > 0 ? '참가 ' + cnt + '건' : '-';
        const url = '/mypage/' + encodeURIComponent(m.id || '');
        return '<li class="sidebar-ranking-item"><a href="' + url + '"><span class="sidebar-rank">' + rank + '</span><span class="sidebar-rank-name">' + name + '</span><span class="sidebar-rank-value">' + escapeHtml(value) + '</span></a></li>';
      }).join('');
    }).catch(function() {
      rankingList.innerHTML = '<li class="sidebar-ranking-item" style="color:var(--gray-muted);font-size:0.85rem;">로드 실패</li>';
    });
  }

  const participateList = document.getElementById('activityParticipateList');
  if (participateList) {
    const formatTitle = (t) => (t && t.length > 14 ? t.slice(0, 13) + '…' : t) || '';
    fetch('/api/team/activity').then(function(r) { return r.json(); }).then(function(j) {
      if (!j.success || !j.data || j.data.length === 0) {
        participateList.innerHTML = '<div style="font-size:0.8rem;color:var(--gray-muted);padding:8px;">참가 기록이 없습니다.</div>';
        return;
      }
      participateList.innerHTML = j.data.map(function(a) {
        const url = (a.url || '#').replace(/"/g, '&quot;');
        return '<a href="' + url + '" class="activity-item participate" target="_blank" rel="noopener" title="' + escapeHtml(a.title) + '">' +
          '<span class="activity-name">' + escapeHtml(a.nickname) + '</span><span class="activity-dot">·</span><span class="activity-title">' + escapeHtml(formatTitle(a.title)) + '</span></a>';
      }).join('');
    }).catch(function() {
      participateList.innerHTML = '<div style="font-size:0.8rem;color:var(--gray-muted);padding:8px;">로드 실패</div>';
    });
  }
})();
</script>
