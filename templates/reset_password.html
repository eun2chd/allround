<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" href="{{ url_for('static', filename='images/favicon.png') }}">
  <title>비밀번호 재설정 | Ntpercent</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
  <style>
    @font-face {
      font-family: 'Pretendard Variable';
      src: url("{{ url_for('static', filename='font/PretendardVariable.ttf') }}") format('truetype');
      font-weight: 100 900;
      font-style: normal;
    }
    :root {
      --main-purple: #6d28d9;
      --main-purple-hover: #5b21b6;
      --soft-purple: #ede9fe;
      --text-dark: #212121;
      --gray-muted: #9ca3af;
      --bg-white: #ffffff;
      --border-gray: #9ca3af;
      --radius: 8px;
      --font: 'Pretendard Variable', 'Pretendard', -apple-system, sans-serif;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: var(--font);
      background: url("{{ url_for('static', filename='images/background.jpg') }}") center / cover no-repeat fixed;
      color: var(--text-dark);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .reset-card {
      width: 100%;
      max-width: 400px;
      background: var(--bg-white);
      border-radius: 16px;
      padding: 40px 32px;
      box-shadow: 0 4px 24px rgba(109, 40, 217, 0.12);
    }
    .reset-card h2 {
      font-size: 1.25rem;
      font-weight: 600;
      text-align: center;
      margin-bottom: 24px;
    }
    .form-group {
      margin-bottom: 16px;
    }
    .form-group label {
      display: block;
      font-size: 0.9rem;
      font-weight: 500;
      margin-bottom: 8px;
    }
    .form-group input {
      width: 100%;
      padding: 14px 16px;
      font-size: 0.95rem;
      border: 1px solid var(--border-gray);
      border-radius: var(--radius);
      outline: none;
    }
    .form-group input:focus {
      border-color: var(--main-purple);
      box-shadow: 0 0 0 3px rgba(109, 40, 217, 0.15);
    }
    .btn-submit {
      width: 100%;
      padding: 14px;
      font-size: 1rem;
      font-weight: 600;
      color: #fff;
      background: var(--main-purple);
      border: none;
      border-radius: var(--radius);
      cursor: pointer;
      margin-top: 8px;
    }
    .btn-submit:hover { background: var(--main-purple-hover); }
    .reset-footer {
      text-align: center;
      margin-top: 24px;
    }
    .reset-footer a {
      color: var(--main-purple);
      text-decoration: none;
      font-weight: 500;
    }
    .reset-footer a:hover { text-decoration: underline; }
    .reset-msg {
      padding: 12px;
      margin-bottom: 16px;
      border-radius: var(--radius);
      font-size: 0.9rem;
      text-align: center;
    }
    .reset-msg.error { background: #fef2f2; color: #b91c1c; }
    .reset-msg.success { background: #f0fdf4; color: #166534; }
    .reset-msg.info { background: #eff6ff; color: #1d4ed8; }
    #resetForm { display: none; }
    #resetForm.ready { display: block; }
    #resetWaiting { text-align: center; padding: 24px; color: var(--gray-muted); }
  </style>
</head>
<body>
  <div class="reset-card">
    <h2>새 비밀번호 설정</h2>
    <div id="resetWaiting">토큰 확인 중...</div>
    <div id="resetMsg" class="reset-msg" style="display:none"></div>
    <form id="resetForm" class="reset-form" method="POST" action="">
      <div class="form-group">
        <label for="password">새 비밀번호</label>
        <input type="password" id="password" name="password" placeholder="숫자 6자 + 특수문자 1개" required minlength="7">
      </div>
      <div class="form-group">
        <label for="passwordConfirm">비밀번호 확인</label>
        <input type="password" id="passwordConfirm" placeholder="비밀번호 다시 입력" required>
      </div>
      <button type="submit" class="btn-submit">비밀번호 변경</button>
    </form>
    <p class="reset-footer"><a href="{{ url_for('login_page') }}">로그인으로 돌아가기</a></p>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    (function() {
      var SUPABASE_URL = {{ (supabase_url or '')|tojson }};
      var SUPABASE_ANON_KEY = {{ (supabase_anon_key or '')|tojson }};
      var waiting = document.getElementById('resetWaiting');
      var form = document.getElementById('resetForm');
      var msg = document.getElementById('resetMsg');
      var password = document.getElementById('password');
      var passwordConfirm = document.getElementById('passwordConfirm');

      function showMsg(text, type) {
        msg.textContent = text;
        msg.className = 'reset-msg ' + (type || 'info');
        msg.style.display = 'block';
      }

      function hideMsg() {
        msg.style.display = 'none';
      }

      if (!SUPABASE_URL || !SUPABASE_ANON_KEY) {
        waiting.textContent = '설정 오류입니다.';
        showMsg(' Supabase가 설정되지 않았습니다.', 'error');
        return;
      }

      var hash = window.location.hash.slice(1);
      var params = {};
      hash.split('&').forEach(function(p) {
        var kv = p.split('=');
        if (kv[0]) params[decodeURIComponent(kv[0])] = decodeURIComponent(kv[1] || '');
      });

      var accessToken = params.access_token;
      var refreshToken = params.refresh_token;
      var type = params.type;

      if (type !== 'recovery' || !accessToken) {
        waiting.textContent = '유효하지 않거나 만료된 링크입니다.';
        showMsg('비밀번호 재설정 링크가 유효하지 않거나 만료되었습니다. 아이디/비밀번호 찾기에서 다시 요청해 주세요.', 'error');
        return;
      }

      var supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
      supabase.auth.setSession({ access_token: accessToken, refresh_token: refreshToken }).then(function() {
        waiting.style.display = 'none';
        form.classList.add('ready');
        window.history.replaceState(null, '', window.location.pathname);
      }).catch(function() {
        waiting.textContent = '토큰 처리 실패';
        showMsg('링크 처리에 실패했습니다. 다시 시도해 주세요.', 'error');
      });

      form.addEventListener('submit', function(e) {
        e.preventDefault();
        var pw = password.value;
        var pw2 = passwordConfirm.value;
        if (pw.length < 7) {
          showMsg('비밀번호는 7자 이상이어야 합니다.', 'error');
          return;
        }
        if (!/\d{6,}/.test(pw) || !/[!@#$%^&*()_+\-=[\]{}|;\':",.<>?/`~\\]/.test(pw)) {
          showMsg('숫자 6자 이상, 특수문자 1개 이상을 포함해야 합니다.', 'error');
          return;
        }
        if (pw !== pw2) {
          showMsg('비밀번호가 일치하지 않습니다.', 'error');
          return;
        }
        hideMsg();
        supabase.auth.updateUser({ password: pw }).then(function() {
          showMsg('비밀번호가 변경되었습니다. 로그인해 주세요.', 'success');
          form.style.display = 'none';
          setTimeout(function() {
            window.location.href = {{ url_for('login_page')|tojson }};
          }, 1500);
        }).catch(function(err) {
          showMsg(err.message || '비밀번호 변경에 실패했습니다.', 'error');
        });
      });
    })();
  </script>
</body>
</html>
