name: Crawl K-Startup (전체 1일 2회)

on:
  schedule:
    - cron: '0 3,15 * * *'  # 03:00, 15:00 UTC (KST 12:00, 00:00)
  workflow_dispatch:

jobs:
  crawl-kstartup-full:
    runs-on: ubuntu-latest
    steps:
      - name: Crawl K-Startup (전체)
        run: |
          curl -sS -X POST \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{"full":true}' \
            "${{ secrets.SUPABASE_URL }}/functions/v1/crawl-kstartup"
