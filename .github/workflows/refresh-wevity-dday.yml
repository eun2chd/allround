name: Refresh Wevity D-day (30min)

on:
  schedule:
    - cron: '*/30 * * * *'  # 매 30분
  workflow_dispatch:

jobs:
  refresh-dday:
    runs-on: ubuntu-latest
    steps:
      - name: 위비티 목록 d-day 전체 갱신
        run: |
          curl -sS -X POST \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            -H "Content-Type: application/json" \
            "${{ secrets.SUPABASE_URL }}/functions/v1/refresh-wevity-dday"
