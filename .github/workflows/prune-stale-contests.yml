# 하루 1회: Edge Function prune-stale-contests 호출 (오래된 크롤 공고 정리)
#
# GitHub 저장소 Settings → Secrets and variables → Actions → Secrets:
#   SUPABASE_URL — https://<project-ref>.supabase.co (끝 슬래시 없어도 됨)
#   SUPABASE_SERVICE_ROLE_KEY — Bearer 로 전달. Edge 함수에 CRON_SECRET 이 있으면 그 값과 동일해야 함.

name: Prune stale contests

on:
  schedule:
    # 매일 18:15 UTC (한국 03:15) — 원하면 cron 만 조정
    - cron: '15 18 * * *'
  workflow_dispatch:
    inputs:
      days:
        description: 'updated_at 기준 며칠 이전까지 삭제할지 (1~30)'
        type: string
        default: '3'
        required: false

jobs:
  prune:
    runs-on: ubuntu-latest
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SECRET: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
    steps:
      - name: Call prune-stale-contests
        run: |
          set -euo pipefail
          BASE="${SUPABASE_URL%/}"
          if [ -z "${BASE:-}" ]; then
            echo "::error::SUPABASE_URL secret is not set"
            exit 1
          fi
          URL="${BASE}/functions/v1/prune-stale-contests"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            DAYS='${{ github.event.inputs.days }}'
          else
            DAYS=3
          fi
          if [ -n "${SECRET:-}" ]; then
            curl -sS -f -H "Authorization: Bearer ${SECRET}" "${URL}?days=${DAYS}"
          else
            curl -sS -f "${URL}?days=${DAYS}"
          fi
          echo
