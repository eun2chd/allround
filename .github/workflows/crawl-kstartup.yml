name: Crawl K-Startup (증분 10분)

on:
  schedule:
    - cron: '*/10 * * * *'  # 10분마다 (page 1~3)
  workflow_dispatch:

jobs:
  crawl-kstartup:
    runs-on: ubuntu-latest
    steps:
      - name: Crawl K-Startup (증분)
        run: |
          curl -sS -X POST \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            -H "Content-Type: application/json" \
            "${{ secrets.SUPABASE_URL }}/functions/v1/crawl-kstartup"
